<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 手机端适配核心标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sy.cn - 首页</title>
    <!-- 自定义简洁样式 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            min-height: 100vh;
            background-color: #f6f8fa;
            color: #24292f;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 16px;
            color: #111;
        }
        .desc {
            font-size: 16px;
            line-height: 1.7;
            color: #57606a;
            margin-bottom: 30px;
        }
        .info-box {
            background: #f0f4f8;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .info-box h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            color: #8c959f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎访问 sy.cn</h1>
        <p class="desc">本网站托管于 GitHub Pages，域名 sy.cn 已完成所有权验证，页面自适应手机、电脑设备。</p>

        <div class="info-box">
            <h3>站点信息</h3>
            <p>域名：sy.cn</p>
            <p>托管平台：GitHub Pages</p>
            <p>页面类型：纯静态 HTML</p>
        </div>

        <div class="info-box">
            <h3>部署提示</h3>
            <p>1. 完成域名DNS TXT验证后，域名即可正常绑定仓库</p>
            <p>2. 仓库根目录新建 CNAME 文件，写入 sy.cn 开启自定义域名</p>
            <p>3. 等待10-30分钟DNS解析生效即可正常访问</p>
        </div>

        <footer>
            © 2026 sy.cn | Powered by GitHub Pages
        </footer>
    </div>
</body>
</html>
